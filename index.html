<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4f4f4" />
  <meta name="description" content="تطبيق بسيط لعرض المنتجات والطلب عبر واتساب" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=3" />

  <title>طلب سريع</title>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__badge">طلب سريع عبر واتساب</div>
      <h1 class="hero__title">اختَر المنتج المناسب وأرسل طلبك مباشرة</h1>
      <p class="hero__text"> الطلبات تُرسل مباشرة عبر واتساب</p>
    </header>

    <main class="products" id="products"></main>

    <section class="cart" aria-labelledby="cart-title">
      <div class="cart__top">
        <div>
          <p class="cart__label">ملخص الطلب</p>
          <h2 id="cart-title">السلة</h2>
        </div>
        <div class="cart__total-box">
          <span>الإجمالي</span>
          <strong id="cart-total">0 ₪</strong>
        </div>
      </div>

      <div id="cart-items" class="cart__items empty-state">
        لم تقم بإضافة أي منتج بعد.
      </div>

      <div class="customer-fields">
        <label class="field">
          <span>الاسم</span>
          <input type="text" id="customer-name" placeholder="اختياري" />
        </label>

        <label class="field">
          <span>ملاحظات</span>
          <textarea id="customer-notes" rows="3" placeholder="مثال: الرجاء التواصل قبل التوصيل"></textarea>
        </label>
      </div>

      <button id="order-btn" class="whatsapp-btn" type="button">
        <span class="whatsapp-btn__icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M27.1 4.86A14.85 14.85 0 0 0 4.52 23.1L2.67 29.33l6.38-1.67A14.86 14.86 0 1 0 27.1 4.86Zm-11.16 23a12.22 12.22 0 0 1-6.23-1.7l-.45-.26-3.79.99 1.01-3.69-.29-.48a12.23 12.23 0 1 1 9.75 5.14Zm6.7-9.16c-.37-.19-2.19-1.08-2.53-1.2-.34-.13-.58-.19-.83.18-.24.37-.95 1.2-1.16 1.45-.21.25-.43.28-.8.09-.37-.19-1.55-.57-2.96-1.8-1.09-.97-1.83-2.16-2.05-2.53-.21-.37-.02-.57.16-.75.17-.17.37-.43.55-.64.18-.22.24-.37.37-.62.13-.25.06-.47-.03-.67-.09-.19-.83-2.01-1.14-2.76-.3-.72-.6-.62-.83-.63h-.7c-.25 0-.65.09-.99.46-.34.37-1.29 1.26-1.29 3.07 0 1.81 1.33 3.56 1.51 3.81.18.25 2.61 3.99 6.31 5.59.88.38 1.57.61 2.11.78.89.28 1.7.24 2.34.15.71-.11 2.19-.9 2.5-1.78.31-.88.31-1.63.22-1.78-.09-.16-.34-.25-.71-.43Z" fill="#25D366"/>
          </svg>
        </span>
        <span>اطلب عبر واتساب</span>
      </button>
    </section>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
