<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4f4f4" />
  <meta name="description" content="تطبيق بسيط لعرض المنتجات والطلب عبر واتساب" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=3" />

  <title>طلب سريع</title>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__badge">طلب سريع عبر واتساب</div>
      <h1 class="hero__title">اختَر المنتج المناسب وأرسل طلبك مباشرة</h1>
      <p class="hero__text"> الطلبات تُرسل مباشرة عبر واتساب</p>
    </header>

    <main class="products" id="products"></main>

    <section class="cart" aria-labelledby="cart-title">
      <div class="cart__top">
        <div>
          <p class="cart__label">ملخص الطلب</p>
          <h2 id="cart-title">السلة</h2>
        </div>
        <div class="cart__total-box">
          <span>الإجمالي</span>
          <strong id="cart-total">0 ₪</strong>
        </div>
      </div>

      <div id="cart-items" class="cart__items empty-state">
        لم تقم بإضافة أي منتج بعد.
      </div>

      <div class="customer-fields">
        <label class="field">
          <span>الاسم</span>
          <input type="text" id="customer-name" placeholder="اختياري" />
        </label>

        <label class="field">
          <span>ملاحظات</span>
          <textarea id="customer-notes" rows="3" placeholder="مثال: الرجاء التواصل قبل التوصيل"></textarea>
        </label>
      </div>

      <button id="order-btn" class="whatsapp-btn" type="button">
        <span class="whatsapp-btn__icon" aria-hidden="true">
  <img src="images/whatsapp-icon.svg" alt="" class="whatsapp-btn__icon-img" />
</span>
        <span>اطلب عبر واتساب</span>
      </button>
    </section>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
